# Development overrides — use with:
#   docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
version: "3.9"

services:
  db:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  backend:
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    volumes:
      - ./backend:/app

  celery_beat:
    volumes:
      - ./backend:/app

  frontend:
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

  nginx:
    profiles:
      - nginx  # nginx is opt-in during dev; use: --profile nginx
